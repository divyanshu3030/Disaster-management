<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Disaster Predictor</title>

<style>
/* ---------- GLOBAL ---------- */
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: #1f1f1f; /* Dark grey */
    color: #eee;
}

/* ---------- NAVBAR ---------- */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #141414;
    padding: 15px 40px;
    box-shadow: 0 0 15px #00f2ff;
}

.navbar h2 {
    margin: 0;
    color: #00f2ff;
    font-weight: bold;
    text-shadow: 0 0 8px #00f2ff;
}

.nav-links a {
    margin-left: 20px;
    padding: 8px 15px;
    color: white;
    text-decoration: none;
    font-size: 18px;
    border-radius: 8px;
    transition: 0.3s;
}

.nav-links a:hover,
.nav-links .active {
    background: #00f2ff;
    color: black;
    box-shadow: 0 0 12px #00f2ff;
}

/* ---------- HERO CARD ---------- */
.hero-card {
    width: 80%;
    margin: 40px auto;
    padding: 0;
    border-radius: 20px;
    overflow: hidden;
    background: #2b2b2b;
    box-shadow: 0 0 20px #00eaff55;
}

.hero-card img {
    width: 100%;
    display: block;
    opacity: 0.85;
}

/* ---------- ABOUT CARD ---------- */
.about-card {
    width: 80%;
    margin: 40px auto;
    padding: 30px;
    border-radius: 20px;
    background: #2b2b2b;
    text-align: center;
    box-shadow: 0 0 20px #00ffb355;
}

.about-card h2 {
    color: #00eaff;
    text-shadow: 0 0 8px #00eaff;
}

.about-card p {
    color: #ddd;
    font-size: 18px;
    line-height: 1.6;
}

/* ---------- BUTTON ---------- */
.btn {
    display: block;
    margin: 35px auto;
    padding: 15px 35px;
    font-size: 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #00f2ff;
    color: black;
    font-weight: bold;
    box-shadow: 0 0 15px #00eaff;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px #00f2ff;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>Disaster Predictor</h2>
    <div class="nav-links">
        <a class="active">Home</a>
        <a href="#about">About Us</a>
    </div>
</div>

<!-- HERO IMAGE CARD -->
<div class="hero-card">
    <img src="image1.webp" alt="Disaster Image">
</div>

<!-- BUTTON -->
<button class="btn" onclick="goToPredictor()">Simulate Prediction</button>

<!-- ABOUT US SECTION -->
<div class="about-card" id="about">
    <h2>About Us</h2>
    <p>
        Our system predicts potential disaster risks by analyzing patterns and environmental indicators.
        Using advanced machine-learning models, it provides fast and reliable alerts.
        Designed for safer preparedness, smarter response, and better decision-making.
    </p>
</div>

<script>
function goToPredictor() {
    window.location.href = "disaster.html";
}
</script>

</body>
</html>
